move_up:
  name: Move Up
  description: Move the camera motor up.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. Use this or host to target a specific camera.
      required: false
      selector:
        text:
    host:
      name: Host
      description: Optional camera host (for example 192.168.178.118 or http://192.168.178.118). Use this or entry_id.
      required: false
      selector:
        text:
    step_size:
      name: Step Size
      description: Optional movement step size. Defaults to 40.5.
      required: false
      selector:
        number:
          min: 0.1
          max: 500
          step: 0.1
          mode: box

